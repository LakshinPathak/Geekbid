# ─────────────────────────────────────────────────
# GeekBid — CI/CD Pipeline
# Runs on every push/PR + deploys on main merges
# ─────────────────────────────────────────────────
name: GeekBid CI/CD

on:
  push:
    branches: ["main", "staging", "develop"]
  pull_request:
    branches: ["main", "staging"]

env:
  NODE_VERSION: "20"

jobs:
  # ── Stage 1: Lint + Typecheck ──────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # Mobile / Root
      - name: Install root dependencies
        run: npm ci

      - name: Typecheck (Mobile)
        run: npx tsc --noEmit

      # Web
      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Lint (Web)
        run: npm run lint
        working-directory: web

  # ── Stage 2: Unit Tests ────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --runInBand --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Stage 3: Build Validation ──────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # Backend
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      # Web
      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Build web app
        run: npm run build
        working-directory: web
        env:
          MONGODB_URI: mongodb://localhost:27017/geekbid
          NEXTAUTH_SECRET: ci-test-secret-not-for-production
          NEXTAUTH_URL: http://localhost:3000

      # Docker
      - name: Build Docker images
        run: |
          docker build -t geekbid-backend ./backend
          docker build -t geekbid-web ./web \
            --build-arg MONGODB_URI=mongodb://localhost:27017/geekbid \
            --build-arg NEXTAUTH_SECRET=ci-test-secret \
            --build-arg NEXTAUTH_URL=http://localhost:3000

  # ── Stage 4: Deploy to Staging ─────────────────
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: |
          echo "🚀 Deploy to staging environment"
          echo "TODO: Add Railway/Render/Fly.io deployment commands"
          # Example for Railway:
          # npx @railway/cli@latest up --service backend --environment staging
          # npx @railway/cli@latest up --service web --environment staging

  # ── Stage 5: Deploy to Production ──────────────
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: |
          echo "🚀 Deploy to production environment"
          echo "TODO: Add Railway/Render/Fly.io deployment commands"
          # Example for Railway:
          # npx @railway/cli@latest up --service backend --environment production
          # npx @railway/cli@latest up --service web --environment production
