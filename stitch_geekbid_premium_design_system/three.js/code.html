<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_28 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_28" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_28');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Create a futuristic "Exchange Node" geometry
const group = new THREE.Group();
scene.add(group);

const coreGeom = new THREE.IcosahedronGeometry(1.5, 1);
const coreMat = new THREE.MeshPhongMaterial({
    color: 0x00ff88,
    wireframe: true,
    transparent: true,
    opacity: 0.3,
    emissive: 0x00ff88,
    emissiveIntensity: 0.5
});
const core = new THREE.Mesh(coreGeom, coreMat);
group.add(core);

// Inner solid core
const innerGeom = new THREE.IcosahedronGeometry(0.8, 0);
const innerMat = new THREE.MeshStandardMaterial({
    color: 0x00ff88,
    metalness: 0.8,
    roughness: 0.2,
    emissive: 0x00ff88,
    emissiveIntensity: 0.2
});
const inner = new THREE.Mesh(innerGeom, innerMat);
group.add(inner);

// Floating data points
const pointsGeom = new THREE.BufferGeometry();
const pointsCount = 100;
const coords = new Float32Array(pointsCount * 3);
for(let i = 0; i < pointsCount * 3; i++) {
    coords[i] = (Math.random() - 0.5) * 10;
}
pointsGeom.setAttribute('position', new THREE.BufferAttribute(coords, 3));
const pointsMat = new THREE.PointsMaterial({
    color: 0x00ff88,
    size: 0.05,
    transparent: true,
    opacity: 0.6
});
const points = new THREE.Points(pointsGeom, pointsMat);
scene.add(points);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);
const pointLight = new THREE.PointLight(0x00ff88, 2);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

function animate() {
    requestAnimationFrame(animate);
    
    group.rotation.y += 0.005;
    group.rotation.z += 0.002;
    
    core.rotation.y -= 0.01;
    
    // Pulsing effect
    const pulse = Math.sin(Date.now() * 0.002) * 0.1 + 1.0;
    group.scale.set(pulse, pulse, pulse);
    
    points.rotation.y += 0.001;
    
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_28 -->
</body>
</html>
